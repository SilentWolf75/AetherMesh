[platformio]
default_envs = heltec_v4

[env]
; Stamp the git hash into every build (all environments inherit this).
extra_scripts = pre:version_stamp.py

; Host-side unit tests for pure logic (no Arduino/radio deps). Run: pio test -e native
[env:native]
platform = native
extra_scripts =
test_framework = unity

[env:heltec_v4]
platform = espressif32 @ 6.6.0
board = heltec_v4
framework = arduino
monitor_speed = 115200
build_flags =
    -D HELTEC_V4
    -D CORE_DEBUG_LEVEL=3
lib_deps =
    jgromes/RadioLib@^6.5.0
    nanopb/Nanopb@^0.4.8
    olikraus/U8g2@^2.35.15
    mikalhart/TinyGPSPlus@^1.0.3

[env:rak4631]
platform = https://github.com/maxgerhardt/platform-nordicnrf52.git#rak
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200
build_flags =
    -D RAK4631
lib_deps =
    jgromes/RadioLib@^6.5.0
    nanopb/Nanopb@^0.4.8
    mikalhart/TinyGPSPlus@^1.0.3

[env:rak3401_1w]
platform = https://github.com/maxgerhardt/platform-nordicnrf52.git#rak
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200
build_flags =
    -D RAK3401_1W
lib_deps =
    jgromes/RadioLib@^6.5.0
    nanopb/Nanopb@^0.4.8
    mikalhart/TinyGPSPlus@^1.0.3
