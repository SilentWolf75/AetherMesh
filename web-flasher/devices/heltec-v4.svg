<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none" role="img" aria-label="Heltec WiFi LoRa 32 V4 - OLED - USB-C -->
  <rect x="14" y="42" width="10" height="16" rx="2" fill="#e8eaed" stroke="#9aa0a6" stroke-width="0.8"/>
