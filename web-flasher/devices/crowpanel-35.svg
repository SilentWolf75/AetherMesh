<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none" role="img" aria-label="Elecrow CrowPanel 3.5">
  <defs>
    <linearGradient id="crowBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3444"/>
      <stop offset="1" stop-color="#151b26"/>
    </linearGradient>
    <linearGradient id="crowLcd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a4a6a"/>
      <stop offset="0.5" stop-color="#0f2d45"/>
      <stop offset="1" stop-color="#163a52"/>
    </linearGradient>
  </defs>
  <!-- Enclosure -->
  <rect x="10" y="14" width="140" height="72" rx="8" fill="url(#crowBody)" stroke="#475569" stroke-width="2"/>
  <!-- Bezel -->
  <rect x="16" y="20" width="128" height="56" rx="3" fill="#0b1220" stroke="#64748b" stroke-width="1"/>
  <!-- 3.5" color TFT -->
  <rect x="20" y="24" width="120" height="48" rx="1.5" fill="url(#crowLcd)"/>
  <!-- Soft UI chrome -->
  <rect x="26" y="30" width="52" height="28" rx="2.5" fill="#0b1220" stroke="#4DA3FF" stroke-width="1.3" opacity="0.95"/>
  <path d="M34 46l12-10 10 7 14-12" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="86" y="30" width="46" height="28" rx="2.5" fill="#111827" stroke="#FFB347" stroke-width="1.1"/>
  <circle cx="109" cy="44" r="8" fill="none" stroke="#FFB347" stroke-width="1.6"/>
  <path d="M109 38v12M103 44h12" stroke="#FFB347" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Status bar -->
  <rect x="26" y="60" width="108" height="6" rx="1" fill="#0b1220" opacity="0.55"/>
  <rect x="30" y="61.5" width="18" height="3" rx="0.6" fill="#C8F547" opacity="0.7"/>
  <rect x="52" y="61.5" width="28" height="3" rx="0.6" fill="#4DA3FF" opacity="0.45"/>
  <!-- Side USB / buttons -->
  <rect x="58" y="84" width="44" height="5" rx="2" fill="#334155"/>
  <rect x="24" y="8" width="16" height="8" rx="2" fill="#2dd4bf" stroke="#0f766e" stroke-width="0.8"/>
  <rect x="120" y="8" width="16" height="8" rx="2" fill="#2dd4bf" stroke="#0f766e" stroke-width="0.8"/>
  <!-- Corner screws -->
  <circle cx="18" cy="22" r="1.8" fill="#cbd5e1"/>
  <circle cx="142" cy="22" r="1.8" fill="#cbd5e1"/>
  <circle cx="18" cy="78" r="1.8" fill="#cbd5e1"/>
  <circle cx="142" cy="78" r="1.8" fill="#cbd5e1"/>
</svg>
