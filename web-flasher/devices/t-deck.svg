<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="LILYGO T-Deck">
  <defs>
    <linearGradient id="deckBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="deckLcd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#0c1a2e"/>
    </linearGradient>
  </defs>
  <!-- Antenna stub -->
  <rect x="78" y="2" width="7" height="16" rx="1.5" fill="#151515" stroke="#000" stroke-width="0.6"/>
  <!-- Handheld body -->
  <rect x="30" y="12" width="60" height="100" rx="12" fill="url(#deckBody)" stroke="#111827" stroke-width="2"/>
  <rect x="33" y="15" width="54" height="94" rx="10" fill="#151b26" stroke="#2b3444" stroke-width="0.8"/>
  <!-- Brand strip -->
  <rect x="38" y="18" width="44" height="10" rx="5" fill="#0f141d"/>
  <text x="48" y="25" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="5.5" font-weight="800">LILYGO</text>
  <!-- 2.8" IPS LCD -->
  <rect x="36" y="30" width="48" height="36" rx="2" fill="#05080e" stroke="#334155" stroke-width="1.1"/>
  <rect x="39" y="33" width="42" height="30" rx="1.2" fill="url(#deckLcd)"/>
  <rect x="42" y="37" width="20" height="2.5" rx="0.4" fill="#4DA3FF" opacity="0.9"/>
  <rect x="42" y="43" width="30" height="2" rx="0.3" fill="#7AD4FF" opacity="0.45"/>
  <rect x="42" y="48" width="16" height="2" rx="0.3" fill="#C8F547" opacity="0.4"/>
  <circle cx="72" cy="54" r="4" fill="none" stroke="#4DA3FF" stroke-width="1" opacity="0.5"/>
  <!-- Trackball -->
  <circle cx="60" cy="74" r="5.5" fill="#e5e7eb" stroke="#64748b" stroke-width="1.2"/>
  <circle cx="60" cy="74" r="2.2" fill="#94a3b8"/>
  <!-- Side grips hint -->
  <path d="M28 72h12l5 5M92 72H80l-5 5" stroke="#4b5563" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- QWERTY -->
  <g fill="#d1d5db">
    <rect x="37" y="82" width="5.2" height="4.2" rx="0.8"/><rect x="44" y="82" width="5.2" height="4.2" rx="0.8"/>
    <rect x="51" y="82" width="5.2" height="4.2" rx="0.8"/><rect x="58" y="82" width="5.2" height="4.2" rx="0.8"/>
    <rect x="65" y="82" width="5.2" height="4.2" rx="0.8"/><rect x="72" y="82" width="5.2" height="4.2" rx="0.8"/>
    <rect x="39" y="88" width="5.2" height="4.2" rx="0.8"/><rect x="46" y="88" width="5.2" height="4.2" rx="0.8"/>
    <rect x="53" y="88" width="5.2" height="4.2" rx="0.8"/><rect x="60" y="88" width="5.2" height="4.2" rx="0.8"/>
    <rect x="67" y="88" width="5.2" height="4.2" rx="0.8"/><rect x="74" y="88" width="5.2" height="4.2" rx="0.8"/>
    <rect x="41" y="94" width="5.2" height="4.2" rx="0.8"/><rect x="48" y="94" width="5.2" height="4.2" rx="0.8"/>
    <rect x="55" y="94" width="14" height="4.2" rx="0.8"/><rect x="71" y="94" width="5.2" height="4.2" rx="0.8"/>
  </g>
  <rect x="40" y="101" width="40" height="2" rx="1" fill="#374151"/>
</svg>
