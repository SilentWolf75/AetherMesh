<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none" role="img" aria-label="Heltec WiFi LoRa 32 V3">
  <defs>
    <linearGradient id="v3pcb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c222c"/>
      <stop offset="1" stop-color="#0e1218"/>
    </linearGradient>
    <linearGradient id="v3teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
  </defs>
  <!-- PCB body -->
  <rect x="24" y="24" width="104" height="52" rx="3" fill="url(#v3pcb)" stroke="#3f4756" stroke-width="1.2"/>
  <!-- Teal silkscreen accent strip (classic Heltec look) -->
  <path d="M78 24h50v52H84c-3.5 0-6-2.5-6-6V30c0-3.5 2.5-6 6-6Z" fill="url(#v3teal)" opacity="0.92"/>
  <!-- Spring WiFi antenna (V3 hallmark) -->
  <path d="M118 18c10 0 14 7 14 16v36" stroke="#e5e7eb" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M118 20c7.5 0 11 5.5 11 14v34" stroke="#0f766e" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Header pins silver -->
  <g fill="#c5cdd8">
    <circle cx="34" cy="21" r="1.7"/><circle cx="42" cy="21" r="1.7"/><circle cx="50" cy="21" r="1.7"/>
    <circle cx="58" cy="21" r="1.7"/><circle cx="66" cy="21" r="1.7"/><circle cx="74" cy="21" r="1.7"/>
    <circle cx="34" cy="79" r="1.7"/><circle cx="42" cy="79" r="1.7"/><circle cx="50" cy="79" r="1.7"/>
    <circle cx="58" cy="79" r="1.7"/><circle cx="66" cy="79" r="1.7"/><circle cx="98" cy="79" r="1.7"/>
    <circle cx="106" cy="79" r="1.7"/><circle cx="114" cy="79" r="1.7"/>
  </g>
  <!-- USB-C -->
  <rect x="14" y="41" width="12" height="18" rx="2.2" fill="#d1d5db" stroke="#8b95a1" stroke-width="0.9"/>
  <rect x="16.5" y="45" width="7" height="10" rx="1.4" fill="#1f2937"/>
  <!-- CP2102 / chip area -->
  <rect x="30" y="40" width="16" height="20" rx="1.2" fill="#252b36" stroke="#4b5563" stroke-width="0.6"/>
  <circle cx="38" cy="50" r="3.2" fill="#c9a227" stroke="#f8fafc" stroke-width="0.7"/>
  <!-- OLED -->
  <rect x="52" y="38" width="48" height="28" rx="1.8" fill="#0a1014" stroke="#1a3d38" stroke-width="1.1"/>
  <rect x="55" y="41" width="42" height="22" rx="1" fill="#121212"/>
  <rect x="58" y="44" width="24" height="2.5" rx="0.4" fill="#2dd4bf" opacity="0.8"/>
  <rect x="58" y="50" width="34" height="2" rx="0.4" fill="#94a3b8" opacity="0.5"/>
  <rect x="58" y="55" width="18" height="2" rx="0.4" fill="#94a3b8" opacity="0.35"/>
  <!-- LoRa IPEX -->
  <rect x="128" y="44" width="8" height="14" rx="1.5" fill="#e5e7eb" stroke="#64748b" stroke-width="0.7"/>
  <circle cx="132" cy="51" r="1.8" fill="#111"/>
  <!-- Battery connector -->
  <rect x="30" y="63" width="12" height="5" rx="0.7" fill="#9ca3af"/>
  <text x="68" y="90" fill="#7E90A8" font-family="Arial, sans-serif" font-size="5.5" font-weight="700">V3 · spring antenna</text>
</svg>
