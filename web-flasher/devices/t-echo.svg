<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="LILYGO T-Echo">
  <defs>
    <linearGradient id="echoCaseFix" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#d5dde6"/>
    </linearGradient>
    <linearGradient id="eink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8e6dc"/>
      <stop offset="1" stop-color="#cfcab8"/>
    </linearGradient>
  </defs>
  <!-- GPS antenna mast -->
  <rect x="55" y="4" width="10" height="34" rx="2.2" fill="#1a1a1a" stroke="#000" stroke-width="0.8"/>
  <rect x="53" y="34" width="14" height="8" rx="1.5" fill="#3f3f46"/>
  <rect x="56" y="6" width="8" height="4" rx="1" fill="#52525b"/>
  <!-- ABS body (rounded square) -->
  <rect x="28" y="42" width="64" height="64" rx="14" fill="url(#echoCaseFix)" stroke="#94a3b8" stroke-width="2"/>
  <rect x="32" y="46" width="56" height="56" rx="11" fill="#eef2f6" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Top brand bar -->
  <rect x="40" y="40" width="40" height="12" rx="2.5" fill="#111827" stroke="#374151" stroke-width="0.8"/>
  <text x="47" y="48.5" fill="#4DA3FF" font-family="Arial, sans-serif" font-size="5.5" font-weight="800">LILYGO</text>
  <!-- 1.54" e-paper -->
  <rect x="42" y="58" width="36" height="36" rx="3" fill="url(#eink)" stroke="#8b8680" stroke-width="1.1"/>
  <rect x="45" y="61" width="30" height="30" rx="1.5" fill="#ddd8c8"/>
  <!-- E-ink UI mock -->
  <rect x="48" y="65" width="18" height="2.2" rx="0.4" fill="#3f3f46" opacity="0.7"/>
  <rect x="48" y="71" width="24" height="1.6" rx="0.3" fill="#52525b" opacity="0.45"/>
  <rect x="48" y="76" width="14" height="1.6" rx="0.3" fill="#52525b" opacity="0.35"/>
  <circle cx="66" cy="84" r="5" fill="none" stroke="#3f3f46" stroke-width="1.2" opacity="0.5"/>
  <path d="M66 81v3l2 1.5" stroke="#3f3f46" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
  <!-- Side buttons / screws -->
  <circle cx="35" cy="56" r="1.4" fill="#94a3b8"/>
  <circle cx="85" cy="56" r="1.4" fill="#94a3b8"/>
  <circle cx="35" cy="92" r="1.4" fill="#94a3b8"/>
  <circle cx="85" cy="92" r="1.4" fill="#94a3b8"/>
  <path d="M33 66h4M33 72h4M33 78h4" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Status LED -->
  <circle cx="82" cy="50" r="2.2" fill="#C8F547"/>
</svg>
