syntax = "proto3";

package aethermesh;

option java_package = "com.example.aethermesh.proto";
option java_multiple_files = true;

// Wrapper for all packets sent over LoRa or BLE
message MeshPacket {
  uint32 sender_id = 1;      // Unique 32-bit ID (derived from MCU MAC address)
  uint32 recipient_id = 2;   // Recipient ID (0xFFFFFFFF for broadcast)
  uint32 packet_id = 3;      // Sequence number generated by sender
  uint32 hop_limit = 4;      // Remaining hops allowed
  bool want_ack = 5;         // True if sender requests an ACK
  uint32 prev_hop_id = 10;   // The node that just transmitted/relayed this packet
  float rx_rssi = 14;        // Received Signal Strength Indicator (LoRa last hop)
  float rx_snr = 15;         // Signal-to-Noise Ratio (LoRa last hop)
  uint32 retry_count = 16;   // Retransmit attempt for this packet_id; relays forward higher attempts.
  uint32 protocol_version = 23; // 0/1 = legacy packet, 2 = authenticated envelope capable.
  uint64 session_id = 24;       // Random boot/session identity used for replay protection.
  uint32 auth_counter = 25;     // Monotonic counter within session_id; 0 when unauthenticated.
  bytes auth_tag = 26;          // Truncated packet authentication tag; empty for V1 compatibility.

  oneof payload {
    TextMessage text = 6;
    Telemetry telemetry = 7;
    RouteDiscovery route_discovery = 8;
    Ack ack = 9;
    NodeConfig config = 11;
    AuthRequest auth_request = 12;
    AuthResponse auth_response = 13;
    DeliveryStatus delivery_status = 17;
    OtaControl ota_control = 18;
    OtaData ota_data = 19;
    OtaStatus ota_status = 20;
    TraceRoute trace_route = 21;
    MeshDiagnostics diagnostics = 22;
  }
}

// Local node health snapshot. This payload is emitted to the authenticated BLE
// companion and is never routed over LoRa.
message MeshDiagnostics {
  uint32 tx_packets = 1;
  uint32 tx_failures = 2;
  uint32 rx_packets = 3;
  uint32 relayed_packets = 4;
  uint32 retries = 5;
  uint32 acked_packets = 6;
  uint32 ack_timeouts = 7;
  uint32 duplicate_packets = 8;
  uint32 cad_busy_events = 9;
  uint32 queue_drops = 10;
  uint32 route_changes = 11;
  uint32 active_routes = 12;
  uint32 rebroadcast_queue_depth = 13;
  uint32 pending_ack_depth = 14;
  uint32 airtime_ms = 15;
  uint32 uptime_seconds = 16;
  uint32 protocol_version = 17;
}

// --- BLE firmware update (OTA). These messages travel over BLE only, never
// over LoRa. Flow: phone sends BEGIN (size+digests), node replies READY; phone
// streams OtaData chunks in windows of OTA_WINDOW, node acks progress with
// IN_PROGRESS every window; phone sends END, node verifies SHA-256 (plus MD5
// for legacy compatibility), replies
// SUCCESS and reboots into the new image. ABORT (either side) cancels.

message OtaControl {
  enum Op {
    BEGIN = 0;
    END = 1;
    ABORT = 2;
    ENTER_DFU = 3;  // nRF52/RAK: reboot into the Adafruit/Nordic DFU bootloader;
                    // the phone then streams the .zip DFU package to the
                    // bootloader itself (Nordic DFU protocol), not this app code.
  }
  Op op = 1;
  uint32 total_size = 2;   // firmware image size in bytes (BEGIN)
  string md5 = 3;          // hex MD5 of the full image (BEGIN)
  string sha256 = 4;       // hex SHA-256 of the full image (BEGIN, preferred)
}

message OtaData {
  uint32 offset = 1;       // byte offset of this chunk; must be sequential
  bytes data = 2;          // chunk payload (max 192 bytes, see mesh.options)
}

message OtaStatus {
  enum State {
    IDLE = 0;
    READY = 1;        // BEGIN accepted, send data
    IN_PROGRESS = 2;  // periodic ack; next_offset = bytes flashed so far
    SUCCESS = 3;      // image verified, rebooting
    ERROR = 4;        // aborted; message says why
  }
  State state = 1;
  uint32 next_offset = 2;
  string message = 3;
}

// Standard chat text message
message TextMessage {
  string content = 1;
  string channel = 2;        // Target channel name (default: "General")
  bool is_encrypted = 3;     // True if content is encrypted
}

// Telemetry information periodically broadcasted by nodes
message Telemetry {
  uint32 battery_level = 1;    // 0 - 100%
  float latitude = 2;          // Latitude (degrees)
  float longitude = 3;         // Longitude (degrees)
  int32 altitude = 4;          // Altitude (meters)
  string node_model = 5;       // Board name/model (e.g. "Heltec V4")
  uint32 uptime_seconds = 6;   // Seconds since the node booted
  string firmware_version = 7; // Firmware version string (e.g. "1.2.0")
  bool is_charging = 8;        // True when the battery is charging (voltage rising / on solar)
  float battery_voltage = 9;   // Raw pack voltage (V); 0 if unmeasured. For solar monitoring.
  uint32 position_precision = 10; // Privacy blur radius (meters) applied to lat/lon before
                                  // broadcast; 0 = precise. Receivers should show the node
                                  // as "somewhere within this radius" (uncertainty circle).
  string node_name = 11;          // Configured network-visible name (max 16 characters).
}

// On-air route observation. Each receiver appends itself and the quality of
// the link on which it received the packet. The target turns REQUEST into
// RESPONSE, preserving the outbound path and collecting the return path.
message TraceRoute {
  enum Type {
    REQUEST = 0;
    RESPONSE = 1;
  }
  Type type = 1;
  uint32 trace_id = 2;
  uint32 origin_id = 3;
  uint32 target_id = 4;
  repeated uint32 forward_node_ids = 5;
  repeated sint32 forward_rssi = 6;
  repeated sint32 forward_snr_quarter_db = 7;
  repeated uint32 return_node_ids = 8;
  repeated sint32 return_rssi = 9;
  repeated sint32 return_snr_quarter_db = 10;
  bool forward_truncated = 11;
  bool return_truncated = 12;
}

// Path discovery for unicast routing
message RouteDiscovery {
  enum Type {
    REQUEST = 0;
    REPLY = 1;
  }
  Type type = 1;
  uint32 target_id = 2;      // The node we want to find a route to
  uint32 metric = 3;         // Hop count or link cost
}

// Acknowledgment for reliable packet delivery
message Ack {
  uint32 acked_packet_id = 1;
  float acked_rx_rssi = 2;   // RSSI (dBm) at which the ACKing node heard the acked packet.
                             // Gives the sender the outbound link quality; 0 = not reported.
  float acked_rx_snr = 3;    // SNR (dB) at which the ACKing node heard the acked packet
}

// Local delivery lifecycle event from a connected node to the companion app.
// These events are sent over BLE only; they are not routed over LoRa.
message DeliveryStatus {
  enum State {
    UNKNOWN = 0;
    DELIVERED = 1;
    FAILED = 2;
    RETRYING = 3;
    QUEUED = 4;
    STORED = 5;
    EXPIRED = 6;
  }
  enum Reason {
    REASON_UNSPECIFIED = 0;
    ACK_TIMEOUT = 1;
    QUEUE_EVICTED = 2;
    LOCAL_SEND_FAILED = 3;
    STORE_FULL = 4;
    MESSAGE_EXPIRED = 5;
  }

  uint32 packet_id = 1;
  uint32 recipient_id = 2;
  State state = 3;
  Reason reason = 4;
  uint32 retry_count = 5;
}

// Configuration settings sync
message NodeConfig {
  string node_name = 1;      // Custom name (max size 16 characters)
  uint32 lora_sf = 2;        // 7 to 12
  float lora_bw = 3;         // 125.0, 250.0, 500.0
  int32 lora_tx_power = 4;   // 10 to 22 (up to 30 for 1W)
  uint32 region = 5;         // 0 = US915, 1 = EU868
  uint32 node_role = 6;      // 0 = Client, 1 = Router, 2 = Low-Power Repeater
  uint32 telemetry_interval = 7; // In seconds
  uint32 screen_timeout_secs = 8; // Screen timeout in seconds (0 = display always off, 0xFFFFFFFF = display always on, default/standard is 30s)
  bool power_save_mode = 9;       // Auto sleep, lower telemetry, reduce BLE advertising when low battery
  string config_password = 10;    // Node admin password authorizing a remote (over-LoRa) config change.
                                  // Empty for local BLE config (the BLE session is already authenticated).
  uint32 position_precision = 11; // Privacy blur radius (meters) for broadcast positions; 0 = precise.
  uint32 gps_mode = 12;           // 0 = onboard GPS powered (default), 1 = GPS off to save power
                                  // (position falls back to phone-shared GPS). uint32 so the
                                  // proto3 zero-default means "on" for configs that omit it.
  bool fixed_position = 13;       // True if using a static fixed position instead of GPS
  float fixed_latitude = 14;      // Static latitude
  float fixed_longitude = 15;     // Static longitude
  int32 fixed_altitude = 16;      // Static altitude
  // If true, only node_name is applied (radio/GPS settings ignored) and the
  // node does not reboot. Used for rename-from-phone so names live on the mesh.
  bool apply_name_only = 17;
}

// Authentication request sent by companion app to LoRa node
message AuthRequest {
  string password = 1;
  bool is_change_password = 2;
  string new_password = 3;
}

// Authentication response returned by LoRa node to companion app
message AuthResponse {
  bool success = 1;
  string message = 2;
  bool password_not_set = 3;
}
