syntax = "proto3";

package aethermesh;

option java_package = "com.example.aethermesh.proto";
option java_multiple_files = true;

// Wrapper for all packets sent over LoRa or BLE
message MeshPacket {
  uint32 sender_id = 1;      // Unique 32-bit ID (derived from MCU MAC address)
  uint32 recipient_id = 2;   // Recipient ID (0xFFFFFFFF for broadcast)
  uint32 packet_id = 3;      // Sequence number generated by sender
  uint32 hop_limit = 4;      // Remaining hops allowed
  bool want_ack = 5;         // True if sender requests an ACK
  uint32 prev_hop_id = 10;   // The node that just transmitted/relayed this packet
  float rx_rssi = 14;        // Received Signal Strength Indicator (LoRa last hop)
  float rx_snr = 15;         // Signal-to-Noise Ratio (LoRa last hop)
  uint32 retry_count = 16;   // Retransmit attempt for this packet_id; relays forward higher attempts.

  oneof payload {
    TextMessage text = 6;
    Telemetry telemetry = 7;
    RouteDiscovery route_discovery = 8;
    Ack ack = 9;
    NodeConfig config = 11;
    AuthRequest auth_request = 12;
    AuthResponse auth_response = 13;
    DeliveryStatus delivery_status = 17;
  }
}

// Standard chat text message
message TextMessage {
  string content = 1;
  string channel = 2;        // Target channel name (default: "General")
  bool is_encrypted = 3;     // True if content is encrypted
}

// Telemetry information periodically broadcasted by nodes
message Telemetry {
  uint32 battery_level = 1;    // 0 - 100%
  float latitude = 2;          // Latitude (degrees)
  float longitude = 3;         // Longitude (degrees)
  int32 altitude = 4;          // Altitude (meters)
  string node_model = 5;       // Board name/model (e.g. "Heltec V4")
  uint32 uptime_seconds = 6;   // Seconds since the node booted
  string firmware_version = 7; // Firmware version string (e.g. "1.2.0")
  bool is_charging = 8;        // True when the battery is charging (voltage rising / on solar)
}

// Path discovery for unicast routing
message RouteDiscovery {
  enum Type {
    REQUEST = 0;
    REPLY = 1;
  }
  Type type = 1;
  uint32 target_id = 2;      // The node we want to find a route to
  uint32 metric = 3;         // Hop count or link cost
}

// Acknowledgment for reliable packet delivery
message Ack {
  uint32 acked_packet_id = 1;
  float acked_rx_rssi = 2;   // RSSI (dBm) at which the ACKing node heard the acked packet.
                             // Gives the sender the outbound link quality; 0 = not reported.
  float acked_rx_snr = 3;    // SNR (dB) at which the ACKing node heard the acked packet
}

// Local delivery lifecycle event from a connected node to the companion app.
// These events are sent over BLE only; they are not routed over LoRa.
message DeliveryStatus {
  enum State {
    UNKNOWN = 0;
    DELIVERED = 1;
    FAILED = 2;
    RETRYING = 3;
  }
  enum Reason {
    REASON_UNSPECIFIED = 0;
    ACK_TIMEOUT = 1;
    QUEUE_EVICTED = 2;
    LOCAL_SEND_FAILED = 3;
  }

  uint32 packet_id = 1;
  uint32 recipient_id = 2;
  State state = 3;
  Reason reason = 4;
  uint32 retry_count = 5;
}

// Configuration settings sync
message NodeConfig {
  string node_name = 1;      // Custom name (max size 16 characters)
  uint32 lora_sf = 2;        // 7 to 12
  float lora_bw = 3;         // 125.0, 250.0, 500.0
  int32 lora_tx_power = 4;   // 10 to 22 (up to 30 for 1W)
  uint32 region = 5;         // 0 = US915, 1 = EU868
  uint32 node_role = 6;      // 0 = Client, 1 = Router, 2 = Low-Power Repeater
  uint32 telemetry_interval = 7; // In seconds
  uint32 screen_timeout_secs = 8; // Screen timeout in seconds (0 = display always off, 0xFFFFFFFF = display always on, default/standard is 30s)
  bool power_save_mode = 9;       // Auto sleep, lower telemetry, reduce BLE advertising when low battery
  string config_password = 10;    // Node admin password authorizing a remote (over-LoRa) config change.
                                  // Empty for local BLE config (the BLE session is already authenticated).
}

// Authentication request sent by companion app to LoRa node
message AuthRequest {
  string password = 1;
  bool is_change_password = 2;
  string new_password = 3;
}

// Authentication response returned by LoRa node to companion app
message AuthResponse {
  bool success = 1;
  string message = 2;
  bool password_not_set = 3;
}
