name: Deploy web flasher

on:
  push:
    branches: [ main ]
    paths:
      - 'web-flasher/**'
      - 'firmware/**'
      - 'proto/**'
      - 'app/**'
      - 'tools/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  attestations: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware + bundle flasher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install PlatformIO + esptool
        run: pip install --upgrade platformio esptool

      - name: Build supported firmware targets
        working-directory: firmware
        run: |
          pio run -e heltec_v4
          pio run -e heltec_v3
          pio run -e rak4631
          pio run -e rak3401_1w
          pio run -e rak19026
          pio run -e lilygo_t_echo
          pio run -e lilygo_t_deck
          pio run -e elecrow_crowpanel_35

      - name: Build Android app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          AETHERMESH_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          AETHERMESH_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          AETHERMESH_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: app
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/aethermesh-release.jks"
            export AETHERMESH_ANDROID_KEYSTORE="$RUNNER_TEMP/aethermesh-release.jks"
            ./gradlew :app:assembleRelease -PversionCode=${GITHUB_RUN_NUMBER} -PversionName=1.2.0-${GITHUB_SHA::7}
            echo "release" > "$RUNNER_TEMP/android-build-type"
          else
            echo "::warning::Android signing secrets are absent; publishing a debug-signed APK."
            ./gradlew :app:assembleDebug -PversionCode=${GITHUB_RUN_NUMBER} -PversionName=1.2.0-${GITHUB_SHA::7}
            echo "debug" > "$RUNNER_TEMP/android-build-type"
          fi

      - name: Merge complete USB images + write manifest
        run: |
          set -e
          HASH=$(git rev-parse --short=7 HEAD)
          OUT=web-flasher/firmware
          mkdir -p "$OUT"
          # boot_app0.bin ships with the arduino-esp32 framework package
          BOOT_APP0=$(find ~/.platformio/packages -path '*tools/partitions/boot_app0.bin' | head -n1)
          
          # Merge Heltec V4
          BUILD_V4=firmware/.pio/build/heltec_v4
          NAME_V4="aethermesh-heltec-v4-${HASH}-usb.bin"
          python -m esptool --chip esp32s3 merge_bin -o "$OUT/$NAME_V4" \
            0x0    "$BUILD_V4/bootloader.bin" \
            0x8000 "$BUILD_V4/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_V4/firmware.bin"
            
          # Merge Heltec V3
          BUILD_V3=firmware/.pio/build/heltec_v3
          NAME_V3="aethermesh-heltec-v3-${HASH}-usb.bin"
          python -m esptool --chip esp32s3 merge_bin -o "$OUT/$NAME_V3" \
            0x0    "$BUILD_V3/bootloader.bin" \
            0x8000 "$BUILD_V3/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_V3/firmware.bin"
            
          # Merge Lilygo T-Deck
          BUILD_T_DECK=firmware/.pio/build/lilygo_t_deck
          NAME_T_DECK="aethermesh-t-deck-${HASH}-usb.bin"
          python -m esptool --chip esp32s3 merge_bin -o "$OUT/$NAME_T_DECK" \
            0x0    "$BUILD_T_DECK/bootloader.bin" \
            0x8000 "$BUILD_T_DECK/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_T_DECK/firmware.bin"

          # Merge Elecrow CrowPanel 3.5
          BUILD_CROWPANEL=firmware/.pio/build/elecrow_crowpanel_35
          NAME_CROWPANEL="aethermesh-crowpanel-35-${HASH}-usb.bin"
          python -m esptool --chip esp32s3 merge_bin -o "$OUT/$NAME_CROWPANEL" \
            0x0    "$BUILD_CROWPANEL/bootloader.bin" \
            0x8000 "$BUILD_CROWPANEL/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_CROWPANEL/firmware.bin"
            
          # RAK4631 (nRF52): convert the built .hex into a UF2 for the Adafruit
          # bootloader (drag-and-drop). Family ID 0xADA52840 = Nordic nRF52840.
          BUILD_RAK=firmware/.pio/build/rak4631
          NAME_RAK="aethermesh-rak4631-${HASH}.uf2"
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -o /tmp/uf2conv.py
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o /tmp/uf2families.json
          python /tmp/uf2conv.py "$BUILD_RAK/firmware.hex" -c -f 0xADA52840 -o "$OUT/$NAME_RAK"

          # RAK3401 1W (nRF52): same UF2 bootloader flow as RAK4631.
          BUILD_RAK_1W=firmware/.pio/build/rak3401_1w
          NAME_RAK_1W="aethermesh-rak3401-1w-${HASH}.uf2"
          python /tmp/uf2conv.py "$BUILD_RAK_1W/firmware.hex" -c -f 0xADA52840 -o "$OUT/$NAME_RAK_1W"

          # RAK19026 (nRF52): same UF2 bootloader flow as RAK4631.
          BUILD_RAK_19026=firmware/.pio/build/rak19026
          NAME_RAK_19026="aethermesh-rak19026-${HASH}.uf2"
          python /tmp/uf2conv.py "$BUILD_RAK_19026/firmware.hex" -c -f 0xADA52840 -o "$OUT/$NAME_RAK_19026"

          # Lilygo T-Echo (nRF52): convert the built .bin to UF2
          BUILD_T_ECHO=firmware/.pio/build/lilygo_t_echo
          NAME_T_ECHO="aethermesh-t-echo-${HASH}.uf2"
          python /tmp/uf2conv.py "$BUILD_T_ECHO/firmware.bin" -c -b 0x26000 -f 0xADA52840 -o "$OUT/$NAME_T_ECHO"

          # Write a manifest that the browser can verify before flashing.
          python tools/write_firmware_manifest.py --output "$OUT/manifest.json" --hash "$HASH" \
            --artifact "Heltec V4" "$OUT/$NAME_V4" \
            --artifact "Heltec V3" "$OUT/$NAME_V3" \
            --artifact "RAK4631" "$OUT/$NAME_RAK" \
            --artifact "RAK3401 1W" "$OUT/$NAME_RAK_1W" \
            --artifact "RAK19026" "$OUT/$NAME_RAK_19026" \
            --artifact "LILYGO T-Echo" "$OUT/$NAME_T_ECHO" \
            --artifact "LILYGO T-Deck" "$OUT/$NAME_T_DECK" \
            --artifact "Elecrow CrowPanel 3.5" "$OUT/$NAME_CROWPANEL"
          echo "Bundled $NAME_V4, $NAME_V3, $NAME_RAK, $NAME_RAK_1W, $NAME_RAK_19026, $NAME_T_ECHO, $NAME_T_DECK, $NAME_CROWPANEL"
          ls -la "$OUT"

      - name: Copy Android APK to web-flasher
        run: |
          BUILD_TYPE=$(cat "$RUNNER_TEMP/android-build-type")
          APK_PATH=$(find app -name "app-${BUILD_TYPE}.apk" | head -n1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" web-flasher/aethermesh-app.apk
            echo "$BUILD_TYPE" > web-flasher/ANDROID_BUILD_TYPE.txt
            echo "Copied APK from $APK_PATH to web-flasher"
          else
            echo "ERROR: Compiled APK not found!"
            exit 1
          fi
          cd web-flasher
          sha256sum aethermesh-app.apk firmware/* > SHA256SUMS.txt

      - name: Attest published builds
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            web-flasher/aethermesh-app.apk
            web-flasher/firmware/*

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-flasher

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
