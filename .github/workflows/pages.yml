name: Deploy web flasher

on:
  push:
    branches: [ main ]
    paths:
      - 'web-flasher/**'
      - 'firmware/**'
      - 'proto/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware + bundle flasher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install PlatformIO + esptool
        run: pip install --upgrade platformio esptool

      - name: Build Heltec V4 and V3 firmware
        working-directory: firmware
        run: |
          pio run -e heltec_v4
          pio run -e heltec_v3

      - name: Build Android App (APK)
        working-directory: app
        run: ./gradlew :app:assembleDebug

      - name: Merge complete USB images + write manifest
        run: |
          set -e
          HASH=$(git rev-parse --short=7 HEAD)
          OUT=web-flasher/firmware
          mkdir -p "$OUT"
          # boot_app0.bin ships with the arduino-esp32 framework package
          BOOT_APP0=$(find ~/.platformio/packages -path '*tools/partitions/boot_app0.bin' | head -n1)
          
          # Merge Heltec V4
          BUILD_V4=firmware/.pio/build/heltec_v4
          NAME_V4="aethermesh-heltec-v4-${HASH}-usb.bin"
          python -m esptool --chip esp32s3 merge_bin -o "$OUT/$NAME_V4" \
            0x0    "$BUILD_V4/bootloader.bin" \
            0x8000 "$BUILD_V4/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_V4/firmware.bin"
            
          # Merge Heltec V3
          BUILD_V3=firmware/.pio/build/heltec_v3
          NAME_V3="aethermesh-heltec-v3-${HASH}-usb.bin"
          python -m esptool --chip esp32s3 merge_bin -o "$OUT/$NAME_V3" \
            0x0    "$BUILD_V3/bootloader.bin" \
            0x8000 "$BUILD_V3/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_V3/firmware.bin"
            
          # Write manifest listing both builds
          printf '[\n  {"name":"Heltec V4 — %s (latest)","file":"%s"},\n  {"name":"Heltec V3 — %s (latest)","file":"%s"}\n]\n' "$HASH" "$NAME_V4" "$HASH" "$NAME_V3" > "$OUT/manifest.json"
          echo "Bundled $NAME_V4 and $NAME_V3"
          ls -la "$OUT"

      - name: Copy Android APK to web-flasher
        run: |
          APK_PATH=$(find app -name "app-debug.apk" | head -n1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" web-flasher/aethermesh-app-debug.apk
            echo "Copied APK from $APK_PATH to web-flasher"
          else
            echo "ERROR: Compiled APK not found!"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-flasher

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
