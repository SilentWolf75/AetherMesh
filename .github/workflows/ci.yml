name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  firmware:
    name: Firmware build (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [heltec_v4, heltec_v3, rak4631, rak3401_1w, rak19026, lilygo_t_echo, lilygo_t_deck, elecrow_crowpanel_35]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build ${{ matrix.env }}
        working-directory: firmware
        run: pio run -e ${{ matrix.env }}

  firmware-tests:
    name: Firmware native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Run native tests
        working-directory: firmware
        run: pio test -e native

  mesh-simulator:
    name: Deterministic mesh simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run simulator regression tests
        run: python -m unittest -v tools.test_mesh_simulator tools.test_write_firmware_manifest
      - name: Produce benchmark report
        run: python tools/mesh_simulator.py --messages 1000
      - name: Verify release target parity
        run: python tools/validate_release_targets.py
      - name: Verify web flasher JavaScript
        run: node tools/check_web_flasher.js

  android:
    name: Android build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Assemble debug + unit tests
        working-directory: app
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest
